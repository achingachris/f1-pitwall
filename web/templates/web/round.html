{% extends "web/base.html" %}
{% block content %}
  <p class="crumbs"><a class="back-link" href="{% url 'web:season' year %}">← {{ year }} season</a></p>
  <h1>{{ round.name }}</h1>
  <p class="subhead">Round {{ round.number }} · {{ round.circuit.name }} · {{ round.date|date:"M d, Y" }}</p>
  {% if has_laps %}<p><a class="entity-link" href="{% url 'web:round_laps' year round.number %}">Lap by lap →</a></p>{% endif %}
  {% include "web/partials/round_body.html" %}
{% endblock %}

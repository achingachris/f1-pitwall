[tool.black]
line-length = 100
target-version = ["py312"]
extend-exclude = '''
/(
    \.venv
  | migrations
  | node_modules
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 100
known_django = ["django"]
known_first_party = ["analytics", "app", "competitors", "config", "results", "seasons", "web"]
sections = ["FUTURE", "STDLIB", "DJANGO", "THIRDPARTY", "FIRSTPARTY", "LOCALFOLDER"]
skip = [".venv", "migrations", "node_modules", "build", "dist"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings"
python_files = ["tests.py", "test_*.py", "*_tests.py"]

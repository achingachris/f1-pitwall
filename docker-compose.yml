services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-f1}
      POSTGRES_USER: ${POSTGRES_USER:-f1}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-f1}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-f1}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      FASTF1_CACHE_DIR: /cache/fastf1
      LOG_DIR: /var/log/pitwall
      RUN_BOT_WITH_SERVER: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8003:8000"
    volumes:
      - fastf1cache:/cache/fastf1
      - logs:/var/log/pitwall
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"

  worker:
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      FASTF1_CACHE_DIR: /cache/fastf1
      LOG_DIR: /var/log/pitwall
      RUN_BOT_WITH_SERVER: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - fastf1cache:/cache/fastf1
      - logs:/var/log/pitwall
    # concurrency=1 is load-bearing: jolpica's rate-limiter is in-memory per
    # process, so two parallel sync tasks would each think they own the full
    # 480/hr budget and collectively trip 429s. All sync work routes through
    # this single worker, so serializing is the safest choice.
    command: celery -A config worker -l info --concurrency 1

  beat:
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      LOG_DIR: /var/log/pitwall
      RUN_BOT_WITH_SERVER: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - logs:/var/log/pitwall
    command: celery -A config beat -l info

  bot:
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      FASTF1_CACHE_DIR: /cache/fastf1
      LOG_DIR: /var/log/pitwall
      RUN_BOT_WITH_SERVER: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - fastf1cache:/cache/fastf1
      - logs:/var/log/pitwall
    command: python manage.py run_telegram_bot
    restart: unless-stopped

volumes:
  pgdata: {}
  fastf1cache: {}
  logs: {}
